# See docs at: https://mystmd.org/guide/frontmatter
version: 1
extends:
  - https://raw.githubusercontent.com/projectpythia/pythia-config/main/pythia.yml
project:
  title: Spectral Analysis for Geophysical Data Cookbook
  github: https://projectpythia.org/spectral-analysis-cookbook/
  bibliography:
  - references.bib
  authors:
    - name: The Project Pythia Community
  copyright: '2024'
  toc:
    - file: README.md
    - title: Preamble
      children:
        - file: notebooks/how-to-cite.md
    - title: Data Analysis Methods
      children:
        - file: notebooks/Harmonic_Analysis.ipynb
        - file: notebooks/gibbs-phenomenon.ipynb
        - file: notebooks/eofs-2d.ipynb
        - file: notebooks/eofs-3d.ipynb  
    - title: Data Analysis Applications
      children:
        - file: notebooks/freq-decomp.ipynb
        - file: notebooks/extended-eofs.ipynb
  jupyter:
      binder:
        url: https://binder.projectpythia.org
        repo: projectpythia/cookbook-template
